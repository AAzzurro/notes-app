<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}408笔记{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #2c3e50 !important; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .tag-badge {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 13px;
            text-decoration: none;
            margin-right: 4px;
            color: white;
}
        .tag-badge:hover { background-color: #d0eaf5; }
        .tag-color-0 { background-color: #3498db; }
        .tag-color-1 { background-color: #2ecc71; }
        .tag-color-2 { background-color: #e67e22; }
        .tag-color-3 { background-color: #9b59b6; }
        .tag-color-4 { background-color: #e74c3c; }
        .tag-color-5 { background-color: #1abc9c; }
        .tag-color-6 { background-color: #f39c12; }
        .tag-color-7 { background-color: #d35400; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">📒 408笔记</a>
            {% if current_user.is_authenticated %}
            <div>
                <span class="text-white me-3">{{ current_user.username }}</span>
                <a href="/notes/new" class="btn btn-sm btn-outline-light me-2">写笔记</a>
                <a href="/logout" class="btn btn-sm btn-outline-light">退出</a>
            </div>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
