<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ note.title }}</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <a href="/">返回首页</a> | 
    <a href="/notes/{{ note.id }}/edit">编辑</a> |
    <a href="/notes/{{ note.id }}/delete">删除</a>
    <hr>
    <h2>{{ note.title }}</h2>
    <div id="content"></div>
    <script>
        const raw = {{ note.content | tojson }};
        document.getElementById('content').innerHTML = marked.parse(raw);
    </script>
</body>
</html>
