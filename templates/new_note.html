<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>写笔记</title>
</head>
<body>
    <h2>写新笔记</h2>
    <form method="POST">
        <p>标题：<input type="text" name="title" style="width:400px"></p>
        <p>标签：<input type="text" name="tags" placeholder="用逗号分隔，如：操作系统,虚拟存储器" style="width:400px"></p>
        <p>内容：<br><textarea name="content" rows="15" cols="60"></textarea></p>
        <p><input type="submit" value="保存"></p>
    </form>
    <a href="/">返回首页</a>
</body>
</html>
